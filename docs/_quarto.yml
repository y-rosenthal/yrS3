# Quarto book configuration for yrS3 documentation
# See docs/QUARTO-DOC-GUIDE.qmd for how to install Quarto and render this book.

project:
  type: book
  output-dir: _book

book:
  title: "yrS3 Documentation"
  description: "Tutorial & Testing System — specs, setup, and reference."
  chapters:
    - index.qmd
#    - README.qmd
    - part: "Guide to the documentation"
      chapters:
        - DOC-GUIDE-v001.qmd
        - DOC-AUTHORING-GUIDE.qmd
        - QUARTO-DOC-GUIDE.qmd
    - part: "PRD files (vision documents)"
      chapters:
        - PRD-0.0.1-v003.qmd
        - PRD-0.0.1-v002.qmd
        - PRD-0.0.1-v001.qmd
    - part: "SPEC files for different releases"
      chapters:
        - SPEC-0.0.8-HIERARCHICAL-TAGS-AND-CANONICAL-FACTS.qmd
        - SPEC-0.0.7-QUESTION-BROWSE-DETAIL-VIEW.qmd
        - SPEC-0.0.6-QUESTION-TAGS-AND-BROWSE.qmd
        - SPEC-0.0.5-DEFAULT-OWNER-AND-SYSTEM-LOGGING.qmd
        - SPEC-0.0.4-IMPLEMENT-BASH-QUESTIONS-v001.qmd
        - SPEC-QUESTION-SETS-0.0.2.qmd
        - SPEC-DB-FS-QUESTION-SYNC-0.0.3.qmd
        - SPEC-0.0.1.qmd
    - part: "How to setup and run the system"
      chapters:
        - SETUP-0.0.1-v001.qmd
    - part: "Developer guide"
      chapters:
        - DEVELOPER-GUIDE-0.0.1-v001.qmd
        - AUTOMATED-TESTS-GUIDE-0.0.3-v001.qmd
    - part: "Technical reference"
      chapters:
        - TECH-STACK-0.0.3-v001.md
    - part: "Question Format Specification"
      chapters:
        - QUESTION-MODULE-SPEC.qmd
        - QUESTION-FORMAT-0.0.1.qmd
        - QUESTION-SET-FORMAT-0.0.2.qmd

format:
  html:
    theme: cosmo
    css: sidebar-parts.css
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    code-fold: false
    include-after-body: collapse-sections.html
